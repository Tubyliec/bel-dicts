name: Trigger OBS rebuild

on:
  push:
    tags:
      - 'v*'

jobs:
  trigger-obs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install osc from OBS repository
        run: |
          echo 'deb http://download.opensuse.org/repositories/openSUSE:/Tools/xUbuntu_24.04/ /' \
            | sudo tee /etc/apt/sources.list.d/osc.list
          curl -fsSL https://download.opensuse.org/repositories/openSUSE:/Tools/xUbuntu_24.04/Release.key \
            | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/osc.gpg
          sudo apt-get update
          sudo apt-get install -y osc

      - name: Configure osc
        env:
          OBS_USERNAME: ${{ secrets.OBS_USERNAME }}
          OBS_PASSWORD: ${{ secrets.OBS_PASSWORD }}
        run: |
          mkdir -p ~/.config/osc
          {
            echo '[general]'
            echo 'apiurl = https://api.opensuse.org'
            echo ''
            echo '[https://api.opensuse.org]'
            echo "user = ${OBS_USERNAME}"
            echo "pass = ${OBS_PASSWORD}"
          } > ~/.config/osc/oscrc

      - name: Checkout OBS package and update
        env:
          OBS_USERNAME: ${{ secrets.OBS_USERNAME }}
        run: |
          VERSION="${GITHUB_REF##*/v}"

          git archive --format=tar --prefix="bel-dicts-${VERSION}/" HEAD \
            | gzip > "bel-dicts_${VERSION}.tar.gz"

          MD5=$(md5sum "bel-dicts_${VERSION}.tar.gz" | awk '{print $1}')
          SHA256=$(sha256sum "bel-dicts_${VERSION}.tar.gz" | awk '{print $1}')
          SIZE=$(stat -c%s "bel-dicts_${VERSION}.tar.gz")

          printf 'Format: 3.0 (native)\n' > "bel-dicts_${VERSION}.dsc"
          printf 'Source: bel-dicts\n' >> "bel-dicts_${VERSION}.dsc"
          printf 'Binary: bel-dicts\n' >> "bel-dicts_${VERSION}.dsc"
          printf 'Architecture: all\n' >> "bel-dicts_${VERSION}.dsc"
          printf 'Version: %s\n' "${VERSION}" >> "bel-dicts_${VERSION}.dsc"
          printf 'Maintainer: tubyliec <antikruk@vivaldi.net>\n' >> "bel-dicts_${VERSION}.dsc"
          printf 'Build-Depends: debhelper-compat (= 13)\n' >> "bel-dicts_${VERSION}.dsc"
          printf 'Package-List:\n bel-dicts deb text optional arch=all\n' >> "bel-dicts_${VERSION}.dsc"
          printf 'Files:\n %s %s bel-dicts_%s.tar.gz\n' "${MD5}" "${SIZE}" "${VERSION}" >> "bel-dicts_${VERSION}.dsc"
          printf 'Checksums-Sha256:\n %s %s bel-dicts_%s.tar.gz\n' "${SHA256}" "${SIZE}" "${VERSION}" >> "bel-dicts_${VERSION}.dsc"

          osc co home:${OBS_USERNAME}:bel-dicts bel-dicts
          cd home:${OBS_USERNAME}:bel-dicts/bel-dicts

          cp "$GITHUB_WORKSPACE/obs/_service" .
          cp "$GITHUB_WORKSPACE/rpm/"*.spec .
          cp "$GITHUB_WORKSPACE/arch/PKGBUILD" .
          cp "$GITHUB_WORKSPACE/bel-dicts_${VERSION}.tar.gz" .
          cp "$GITHUB_WORKSPACE/bel-dicts_${VERSION}.dsc" .

          osc addremove
          osc status
          osc commit -m "Trigger rebuild for ${GITHUB_REF##*/}"

      - name: Verify OBS commit
        env:
          OBS_USERNAME: ${{ secrets.OBS_USERNAME }}
        run: |
          cd home:${OBS_USERNAME}:bel-dicts/bel-dicts
          echo "=== Final package state ==="
          osc ls home:${OBS_USERNAME}:bel-dicts bel-dicts